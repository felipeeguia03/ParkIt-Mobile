# ── E2E: Login con credenciales UCC ──────────────────────────────────────────
# Uso: maestro test flows/login.yaml -e TEST_EMAIL=tu@ucc.edu.ar -e TEST_PASS=tupass
#
# Este flow también lo usan los otros flows vía `runFlow`.

appId: com.ucc.parkit
---
- launchApp:
    clearState: true

# Branding visible → app cargó
- assertVisible:
    text: "ParkIt UCC"
    timeout: 8000

# Completar email
- tapOn:
    text: "nombre@ucc.edu.ar"     # placeholder del campo
- inputText: "${TEST_EMAIL}"

# Completar contraseña
- tapOn:
    text: "Tu contraseña UCC"
- inputText: "${TEST_PASS}"

- tapOn: "Ingresar"

# Home cargada — confirma login exitoso
- assertVisible:
    text: "Lugar disponible"
    timeout: 12000
